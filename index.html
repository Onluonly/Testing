<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI на практике</title>
  <style>
    /* Базовые стили: шрифт, сброс отступов */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
      background: #f5f6fa;
      line-height: 1.6;
    }

    /* Приветственный блок (hero) */
    .hero {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
    }

    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 1.25rem;
      max-width: 600px;
      opacity: 0.95;
    }
  </style>
</head>
<body>

  <!-- Вступительный блок: приветствие -->
  <section class="hero">
    <h1>AI на практике</h1>
    <p>Привет! Здесь я просто и без воды показываю, как искусственный интеллект помогает в реальных задачах.</p>
  </section>

</body>
</html>
